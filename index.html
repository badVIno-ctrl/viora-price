<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Value Estimator | VioraStudio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    /* =============================================
       CSS VARIABLES & RESET
    ============================================= */
    :root {
      --bg-primary: #0B0C10;
      --bg-secondary: #1F2833;
      --bg-panel: rgba(31, 40, 51, 0.6);
      --text-primary: #C5C6C7;
      --text-secondary: #8a8f9a;
      --accent-1: #66FCF1;
      --accent-2: #45A29E;
      --accent-dim: rgba(102, 252, 241, 0.12);
      --accent-glow: rgba(102, 252, 241, 0.35);
      --glass-bg: rgba(31, 40, 51, 0.45);
      --glass-border: rgba(102, 252, 241, 0.12);
      --glass-blur: blur(18px);
      --radius-lg: 20px;
      --radius-md: 14px;
      --radius-sm: 8px;
      --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    /* =============================================
       ANIMATED BACKGROUND
    ============================================= */
    .bg-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .bg-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      animation: orbFloat linear infinite;
    }

    .bg-orb-1 {
      width: 520px;
      height: 520px;
      background: radial-gradient(circle, #66FCF1, #45A29E);
      top: -160px;
      left: -160px;
      animation-duration: 22s;
      opacity: 0.13;
    }

    .bg-orb-2 {
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, #45A29E, #1F2833);
      bottom: -100px;
      right: -100px;
      animation-duration: 28s;
      animation-direction: reverse;
      opacity: 0.15;
    }

    .bg-orb-3 {
      width: 250px;
      height: 250px;
      background: radial-gradient(circle, #66FCF1, transparent);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation-duration: 18s;
      opacity: 0.06;
    }

    @keyframes orbFloat {
      0%   { transform: translateY(0px) rotate(0deg) scale(1); }
      25%  { transform: translateY(-30px) rotate(90deg) scale(1.05); }
      50%  { transform: translateY(-15px) rotate(180deg) scale(0.96); }
      75%  { transform: translateY(-40px) rotate(270deg) scale(1.03); }
      100% { transform: translateY(0px) rotate(360deg) scale(1); }
    }

    /* Grid overlay */
    .bg-grid {
      position: fixed;
      inset: 0;
      z-index: 0;
      background-image:
        linear-gradient(rgba(102, 252, 241, 0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(102, 252, 241, 0.025) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
    }

    /* =============================================
       APP LAYOUT
    ============================================= */
    .app-wrapper {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 820px;
      margin: 0 auto;
      width: 100%;
      padding: 16px 16px 16px;
    }

    /* =============================================
       TOP BAR
    ============================================= */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
      flex-shrink: 0;
      padding: 0 2px;
    }

    .top-bar-brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .ai-logo {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      font-weight: 500;
      color: var(--bg-primary);
      letter-spacing: -0.5px;
      box-shadow: 0 0 18px rgba(102, 252, 241, 0.3);
      flex-shrink: 0;
    }

    .brand-text h1 {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: 0.3px;
      line-height: 1.2;
    }

    .brand-text p {
      font-size: 10px;
      color: var(--text-secondary);
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.5px;
    }

    /* Language Toggle */
    .lang-toggle-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .lang-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-secondary);
      letter-spacing: 1px;
      transition: color var(--transition);
      min-width: 20px;
      text-align: center;
    }

    .lang-label.active {
      color: var(--accent-1);
    }

    .lang-toggle {
      position: relative;
      width: 52px;
      height: 26px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .lang-toggle input {
      display: none;
    }

    .lang-toggle-track {
      position: absolute;
      inset: 0;
      background: var(--bg-secondary);
      border: 1px solid var(--glass-border);
      border-radius: 13px;
      transition: all var(--transition);
      backdrop-filter: var(--glass-blur);
    }

    .lang-toggle input:checked + .lang-toggle-track {
      background: rgba(102, 252, 241, 0.1);
      border-color: var(--accent-2);
      box-shadow: 0 0 10px rgba(102, 252, 241, 0.15);
    }

    .lang-toggle-thumb {
      position: absolute;
      top: 3px;
      left: 3px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
      box-shadow: 0 0 10px var(--accent-glow);
      transition: transform var(--transition), box-shadow var(--transition);
      pointer-events: none;
    }

    .lang-toggle input:checked ~ .lang-toggle-thumb {
      transform: translateX(26px);
    }

    /* Reset chat button */
    .btn-reset {
      background: transparent;
      border: 1px solid rgba(102, 252, 241, 0.15);
      color: var(--text-secondary);
      border-radius: var(--radius-sm);
      padding: 5px 12px;
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: all var(--transition);
      backdrop-filter: blur(4px);
    }

    .btn-reset:hover {
      border-color: var(--accent-1);
      color: var(--accent-1);
      background: var(--accent-dim);
      box-shadow: 0 0 12px rgba(102, 252, 241, 0.1);
    }

    /* =============================================
       CHAT WINDOW
    ============================================= */
    .chat-container {
      flex: 1;
      position: relative;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-radius: var(--radius-lg);
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.45),
        inset 0 1px 0 rgba(255, 255, 255, 0.04),
        0 0 0 1px rgba(102, 252, 241, 0.04);
    }

    .chat-header-stripe {
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--accent-2), var(--accent-1), var(--accent-2), transparent);
      background-size: 200% 100%;
      animation: stripeSlide 3s linear infinite;
      flex-shrink: 0;
    }

    @keyframes stripeSlide {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }

    /* Custom scrollbar */
    .chat-messages::-webkit-scrollbar {
      width: 4px;
    }
    .chat-messages::-webkit-scrollbar-track {
      background: transparent;
    }
    .chat-messages::-webkit-scrollbar-thumb {
      background: rgba(102, 252, 241, 0.2);
      border-radius: 4px;
    }
    .chat-messages::-webkit-scrollbar-thumb:hover {
      background: rgba(102, 252, 241, 0.4);
    }

    /* =============================================
       MESSAGE BUBBLES
    ============================================= */
    .message {
      display: flex;
      flex-direction: column;
      max-width: 82%;
      animation: msgIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes msgIn {
      from {
        opacity: 0;
        transform: translateY(14px) scale(0.96);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .message.user {
      align-self: flex-end;
      align-items: flex-end;
    }

    .message.ai {
      align-self: flex-start;
      align-items: flex-start;
    }

    .msg-meta {
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-secondary);
      margin-bottom: 5px;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .msg-meta .meta-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--accent-2);
      display: inline-block;
    }

    .message.ai .msg-meta .meta-dot {
      background: var(--accent-1);
      box-shadow: 0 0 6px var(--accent-1);
    }

    .msg-bubble {
      padding: 12px 16px;
      border-radius: var(--radius-md);
      font-size: 14px;
      line-height: 1.65;
      letter-spacing: 0.15px;
      position: relative;
      word-break: break-word;
    }

    .message.user .msg-bubble {
      background: rgba(102, 252, 241, 0.1);
      border: 1px solid rgba(102, 252, 241, 0.2);
      border-bottom-right-radius: 4px;
      color: var(--text-primary);
      box-shadow:
        0 4px 16px rgba(0,0,0,0.25),
        inset 0 1px 0 rgba(102, 252, 241, 0.08);
    }

    .message.ai .msg-bubble {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-bottom-left-radius: 4px;
      color: var(--text-primary);
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    }

    /* Highlighted text from AI (parsed **bold**) */
    .msg-bubble .ai-highlight {
      color: var(--accent-1);
      font-weight: 600;
    }

    /* Typing cursor */
    .typing-cursor {
      display: inline-block;
      width: 2px;
      height: 14px;
      background: var(--accent-1);
      margin-left: 2px;
      vertical-align: middle;
      border-radius: 1px;
      animation: cursorBlink 0.7s step-end infinite;
    }

    @keyframes cursorBlink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* =============================================
       TYPING INDICATOR (three dots)
    ============================================= */
    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 12px 16px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: var(--radius-md);
      border-bottom-left-radius: 4px;
      width: fit-content;
      animation: msgIn 0.3s ease both;
    }

    .typing-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent-1);
      animation: dotPulse 1.2s ease-in-out infinite;
      opacity: 0.6;
    }

    .typing-dot:nth-child(1) { animation-delay: 0s; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes dotPulse {
      0%, 80%, 100% { transform: scale(1); opacity: 0.4; }
      40%           { transform: scale(1.3); opacity: 1; }
    }

    /* =============================================
       INPUT AREA
    ============================================= */
    .input-area {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border-top: 1px solid var(--glass-border);
      flex-shrink: 0;
      background: rgba(11, 12, 16, 0.3);
    }

    .input-wrap {
      flex: 1;
      position: relative;
    }

    #user-input {
      width: 100%;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 12px 16px;
      color: var(--text-primary);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 14px;
      outline: none;
      resize: none;
      max-height: 120px;
      min-height: 44px;
      transition: border-color var(--transition), box-shadow var(--transition), background var(--transition);
      line-height: 1.5;
      overflow-y: auto;
      scrollbar-width: thin;
    }

    #user-input::placeholder {
      color: rgba(197, 198, 199, 0.35);
    }

    #user-input:focus {
      border-color: rgba(102, 252, 241, 0.45);
      background: rgba(102, 252, 241, 0.04);
      box-shadow:
        0 0 0 3px rgba(102, 252, 241, 0.07),
        0 0 20px rgba(102, 252, 241, 0.08);
    }

    #user-input::-webkit-scrollbar {
      width: 3px;
    }
    #user-input::-webkit-scrollbar-thumb {
      background: rgba(102,252,241,0.2);
      border-radius: 3px;
    }

    .send-btn {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all var(--transition);
      box-shadow: 0 4px 14px rgba(102, 252, 241, 0.25);
      position: relative;
      overflow: hidden;
    }

    .send-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
      border-radius: inherit;
      opacity: 0;
      transition: opacity var(--transition);
    }

    .send-btn:hover {
      transform: translateY(-1px) scale(1.04);
      box-shadow: 0 6px 22px rgba(102, 252, 241, 0.4);
    }

    .send-btn:hover::before { opacity: 1; }

    .send-btn:active {
      transform: scale(0.97);
      box-shadow: 0 2px 8px rgba(102, 252, 241, 0.2);
    }

    .send-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .send-btn svg {
      width: 18px;
      height: 18px;
      fill: var(--bg-primary);
    }

    /* =============================================
       RESULT CARD
    ============================================= */
    .result-card-overlay {
      position: absolute;
      inset: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(11, 12, 16, 0.6);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      animation: overlayIn 0.5s ease both;
    }

    @keyframes overlayIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .result-card {
      width: 100%;
      max-width: 420px;
      background: rgba(31, 40, 51, 0.7);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(102, 252, 241, 0.22);
      border-radius: 24px;
      padding: 28px 24px 24px;
      box-shadow:
        0 16px 48px rgba(0,0,0,0.55),
        inset 0 1px 0 rgba(255,255,255,0.06),
        0 0 40px rgba(102, 252, 241, 0.06);
      animation: cardIn 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      position: relative;
      overflow: hidden;
    }

    @keyframes cardIn {
      from {
        opacity: 0;
        transform: scale(0.85) translateY(24px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .result-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--accent-2), var(--accent-1), var(--accent-2), transparent);
      background-size: 200% 100%;
      animation: stripeSlide 3s linear infinite;
    }

    .result-card-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(102, 252, 241, 0.08);
      border: 1px solid rgba(102, 252, 241, 0.18);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--accent-1);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 18px;
    }

    .result-card-badge .badge-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--accent-1);
      box-shadow: 0 0 6px var(--accent-1);
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50%       { transform: scale(1.4); opacity: 0.7; }
    }

    .result-card h2 {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 20px;
      line-height: 1.4;
    }

    /* Metric row */
    .result-metric {
      margin-bottom: 20px;
    }

    .result-metric-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .result-metric-label {
      font-size: 11px;
      color: var(--text-secondary);
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .result-metric-value {
      font-size: 22px;
      font-weight: 700;
      color: var(--accent-1);
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: -0.5px;
      text-shadow: 0 0 20px rgba(102, 252, 241, 0.4);
      line-height: 1;
    }

    .result-progress-track {
      height: 6px;
      background: rgba(255,255,255,0.06);
      border-radius: 6px;
      overflow: hidden;
      position: relative;
    }

    .result-progress-bar {
      height: 100%;
      border-radius: 6px;
      background: linear-gradient(90deg, var(--accent-2), var(--accent-1));
      box-shadow: 0 0 12px rgba(102, 252, 241, 0.4);
      transition: width 1.5s cubic-bezier(0.4, 0, 0.2, 1);
      width: 0;
      position: relative;
    }

    .result-progress-bar::after {
      content: '';
      position: absolute;
      top: 0;
      right: 0;
      width: 20px;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(102,252,241,0.5));
      border-radius: 6px;
      animation: shimmer 1.5s ease-in-out infinite;
    }

    @keyframes shimmer {
      0%, 100% { opacity: 0.4; }
      50%       { opacity: 1; }
    }

    .result-divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--glass-border), transparent);
      margin: 16px 0;
    }

    .result-sub-text {
      font-size: 12px;
      color: var(--text-secondary);
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.3px;
      line-height: 1.6;
    }

    .result-sub-text span {
      color: var(--accent-1);
    }

    .result-actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .btn-share {
      flex: 1;
      padding: 11px;
      background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
      border: none;
      border-radius: var(--radius-sm);
      color: var(--bg-primary);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition);
      letter-spacing: 0.3px;
    }

    .btn-share:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(102, 252, 241, 0.35);
    }

    .btn-close-result {
      padding: 11px 14px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--radius-sm);
      color: var(--text-secondary);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px;
      cursor: pointer;
      transition: all var(--transition);
    }

    .btn-close-result:hover {
      background: rgba(255,255,255,0.07);
      color: var(--text-primary);
    }

    /* =============================================
       VIORA STUDIO EASTER EGG (Fixed bottom-right)
    ============================================= */
    .viora-pill {
      position: fixed;
      bottom: 22px;
      right: 22px;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 0;
      overflow: hidden;
      background: rgba(31, 40, 51, 0.65);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(102, 252, 241, 0.2);
      border-radius: 30px;
      padding: 8px 14px;
      cursor: pointer;
      text-decoration: none;
      transition:
        max-width 0.45s cubic-bezier(0.4, 0, 0.2, 1),
        border-color 0.3s ease,
        box-shadow 0.3s ease,
        background 0.3s ease;
      max-width: 130px;
      white-space: nowrap;
      box-shadow: 0 4px 20px rgba(0,0,0,0.35);
    }

    .viora-pill:hover {
      max-width: 260px;
      border-color: rgba(102, 252, 241, 0.45);
      background: rgba(31, 40, 51, 0.85);
      box-shadow:
        0 6px 30px rgba(0,0,0,0.4),

    /* =============================================
       WELCOME / EMPTY STATE
    ============================================= */
    .empty-state {

      height: 100%;

      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .empty-state-icon {
      width: 56px;
      height: 56px;
      border-radius: 18px;
      background: linear-gradient(135deg, rgba(102,252,241,0.12), rgba(69,162,158,0.08));
      border: 1px solid rgba(102,252,241,0.15);

    .empty-state-icon svg {

      height: 26px;

    .empty-state h3 {
      font-size: 16px;

      color: var(--text-primary);
    }

    .empty-state p {
      font-size: 13px;
      color: var(--text-secondary);
      max-width: 260px;
      line-height: 1.6;
    }

    .empty-state-tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--accent-2);
      letter-spacing: 1px;
      text-transform: uppercase;
      background: rgba(102,252,241,0.06);
      border: 1px solid rgba(102,252,241,0.1);
      padding: 4px 10px;
      border-radius: 10px;
      margin-top: 4px;

    /* =============================================
       NOTIFICATION TOAST
    ============================================= */
    .toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(-80px);
      background: rgba(31, 40, 51, 0.9);
      border: 1px solid rgba(102,252,241,0.25);
      border-radius: var(--radius-sm);
      padding: 10px 20px;
      font-size: 13px;
      color: var(--accent-1);
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.3px;
      z-index: 999;
      backdrop-filter: blur(12px);
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      white-space: nowrap;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
    }

    /* =============================================
       RESPONSIVE
    ============================================= */
    @media (max-width: 600px) {
      .app-wrapper {
        padding: 10px 10px 10px;
      }

      .brand-text h1 {

      }

      .msg-bubble {
        font-size: 13.5px;
      }

      }

    @media (min-width: 820px) {
      body {
        overflow: hidden;
      }
    }

    /* =============================================
       SCAN LINE EFFECT (subtle)
    ============================================= */
    .chat-container::after {
      content: '';
      position: absolute;
      top: -100%;
      left: 0;

      animation: scanLine 6s linear infinite;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes scanLine {

    }

  <!-- ============ JAVASCRIPT ============ -->
  <script>
    /* =============================================
       CONSTANTS & CONFIG
    ============================================= */
    const MISTRAL_API_KEY = "G9CuVLq1Sfw7BZr4kSBuCReNrHvQNsno";
    const MISTRAL_API_URL = "https://api.mistral.ai/v1/chat/completions";
    const MISTRAL_MODEL   = "mistral-small-latest";

    const SYSTEM_PROMPTS = {
      ru: `Ты — циничный, но объективный AI-оценщик. Твоя цель — оценить рыночную стоимость пользователя и его уникальность в обществе. Задавай вопросы по ОДНОМУ. Всего задай 4 вопроса (про профессию/навыки, опыт, странные привычки, и какой-то необычный психологический выбор). Когда пользователь ответит на все 4 вопроса, выдай краткий, дерзкий анализ его личности. В самом конце своего сообщения ОБЯЗАТЕЛЬНО напиши строго один тег в формате: [RESULT_DATA: сумма_в_долларах|процент_уникальности_числом]. Пример: [RESULT_DATA: 4500|98]. Никаких пояснений к тегу.`,
      en: `You are a cynical but objective AI appraiser. Your goal is to evaluate the user's market value and their uniqueness in society. Ask questions ONE BY ONE. Ask a total of 4 questions (about profession/skills, experience, weird habits, and a strange psychological choice). After the user answers all 4 questions, give a short, edgy analysis of their personality. At the very end of your final message, you MUST include strictly one tag in the format: [RESULT_DATA: amount_in_dollars|uniqueness_percentage_number]. Example: [RESULT_DATA: 4500|98]. Do not explain the tag.`
    };

    const UI_TEXT = {
      ru: {
        brandTitle:    "Оценка Ценности",
        placeholder:   "Напиши что-нибудь...",
        resetLabel:    "Сброс",
        emptyTitle:    "Готов к оценке",
        emptyDesc:     "Начни разговор. ИИ задаст тебе 4 вопроса и оценит твою рыночную стоимость.",
        emptyTag:      "НАЖМИ СТАРТ",
        you:           "Ты",
        ai:            "AI-Оценщик",
        resultBadge:   "АНАЛИЗ ЗАВЕРШЁН",
        resultTitle:   "Твоя оценка готова",
        metaValue:     "РЫНОЧНАЯ СТОИМОСТЬ",
        metaUnique:    "ИНДЕКС УНИКАЛЬНОСТИ",
        resultSub:     "Ты редкий экземпляр. Таких как ты — меньше",
        resultSubEnd:  "людей на планете.",
        btnShare:      "Поделиться результатом",
        btnClose:      "Закрыть",
        toastCopied:   "Скопировано в буфер!",
        toastReset:    "Чат сброшен.",
        toastLang:     "Язык изменён.",
        inputToSend:   "Enter — отправить, Shift+Enter — новая строка"
      },
      en: {
        brandTitle:    "Value Estimator",
        placeholder:   "Type something...",
        resetLabel:    "Reset",
        emptyTitle:    "Ready to evaluate",
        emptyDesc:     "Start the conversation. AI will ask you 4 questions and estimate your market value.",
        emptyTag:      "PRESS START",
        you:           "You",
        ai:            "AI Appraiser",
        resultBadge:   "ANALYSIS COMPLETE",
        resultTitle:   "Your assessment is ready",
        metaValue:     "MARKET VALUE",
        metaUnique:    "UNIQUENESS INDEX",
        resultSub:     "You are a rare specimen. Fewer than",
        resultSubEnd:  "of people are like you.",
        btnShare:      "Share result",
        btnClose:      "Close",
        toastCopied:   "Copied to clipboard!",
        toastReset:    "Chat has been reset.",
        toastLang:     "Language changed.",
        inputToSend:   "Enter to send, Shift+Enter for new line"
      }
    };

    /* =============================================
       STATE
    ============================================= */
    let currentLang    = localStorage.getItem('ai_lang') || 'ru';
    let chatHistory    = [];   // [{role, content}] for API
    let isTyping       = false;
    let resultShown    = false;
    let typingInterval = null;

    /* =============================================
       DOM REFS
    ============================================= */
    const chatMessages   = document.getElementById('chat-messages');
    const userInput      = document.getElementById('user-input');
    const sendBtn        = document.getElementById('send-btn');
    const langSwitch     = document.getElementById('lang-switch');
    const labelRu        = document.getElementById('label-ru');
    const labelEn        = document.getElementById('label-en');
    const brandTitle     = document.getElementById('brand-title');
    const resetBtn       = document.getElementById('btn-reset');
    const resetLabel     = document.getElementById('reset-label');
    const emptyState     = document.getElementById('empty-state');
    const toastEl        = document.getElementById('toast');

    /* =============================================
       INITIALIZATION
    ============================================= */
    function init() {
      // Load saved language
      if (currentLang === 'en') {
        langSwitch.checked = true;
      }
      applyLanguage(false);

      // Load saved chat history
      const saved = localStorage.getItem('ai_chat_history');
      if (saved) {
        try {
          chatHistory = JSON.parse(saved);
          renderSavedHistory();
        } catch(e) {
          chatHistory = [];
        }
      }

      // If no history, show empty state + auto-start
      if (chatHistory.length === 0) {
        showEmptyState(true);
        triggerAIFirstMessage();
      } else {
        showEmptyState(false);
      }

      setupEventListeners();
    }

    /* =============================================
       LANGUAGE
    ============================================= */
    function applyLanguage(animate) {
      const t = UI_TEXT[currentLang];
      brandTitle.textContent     = t.brandTitle;
      userInput.placeholder      = t.placeholder;
      resetLabel.textContent     = t.resetLabel;

      const emptyTitle = document.getElementById('empty-title');
      const emptyDesc  = document.getElementById('empty-desc');
      const emptyTag   = document.getElementById('empty-tag');
      if (emptyTitle) emptyTitle.textContent = t.emptyTitle;
      if (emptyDesc)  emptyDesc.textContent  = t.emptyDesc;
      if (emptyTag)   emptyTag.textContent   = t.emptyTag;

      // Toggle labels style
      if (currentLang === 'ru') {
        labelRu.classList.add('active');
        labelEn.classList.remove('active');
        langSwitch.checked = false;
      } else {
        labelEn.classList.add('active');
        labelRu.classList.remove('active');
        langSwitch.checked = true;
      }

      localStorage.setItem('ai_lang', currentLang);
      if (animate) showToast(t.toastLang);
    }

    /* =============================================
       EVENT LISTENERS
    ============================================= */
    function setupEventListeners() {
      // Send on Enter (but not Shift+Enter)
      userInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          handleSend();
        }
      });

      // Auto-resize textarea
      userInput.addEventListener('input', () => {
        userInput.style.height = 'auto';
        userInput.style.height = Math.min(userInput.scrollHeight, 120) + 'px';
      });

      sendBtn.addEventListener('click', handleSend);

      langSwitch.addEventListener('change', () => {
        currentLang = langSwitch.checked ? 'en' : 'ru';
        applyLanguage(true);
        // If chat has messages, update is silent — new messages use new system prompt
      });

      resetBtn.addEventListener('click', resetChat);
    }

    /* =============================================
       CHAT LOGIC
    ============================================= */
    async function handleSend() {
      const text = userInput.value.trim();
      if (!text || isTyping) return;

      showEmptyState(false);

      // Render user message
      appendMessage('user', text);

      // Clear input
      userInput.value = '';
      userInput.style.height = 'auto';

      // Add to history
      chatHistory.push({ role: 'user', content: text });
      saveChatHistory();

      // Send to AI
      await sendToMistral();
    }

    async function triggerAIFirstMessage() {
      // Small delay so UI is ready
      await delay(600);
      showEmptyState(false);
      await sendToMistral();
    }

    async function sendToMistral() {
      isTyping = true;
      setSendDisabled(true);

      // Show typing indicator
      const typingEl = showTypingIndicator();

      try {
        const messages = [
          { role: 'system', content: SYSTEM_PROMPTS[currentLang] },
          ...chatHistory
        ];

        const response = await fetch(MISTRAL_API_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${MISTRAL_API_KEY}`
          },
          body: JSON.stringify({
            model: MISTRAL_MODEL,
            messages: messages,
            temperature: 0.85,
            max_tokens: 700
          })
        });

        if (!response.ok) {
          throw new Error(`API Error: ${response.status}`);
        }

        const data = await response.json();
        const rawContent = data.choices?.[0]?.message?.content || '';

        // Remove typing indicator
        removeTypingIndicator(typingEl);

        // Process content — extract RESULT_DATA tag
        const { cleanText, resultData } = extractResultData(rawContent);

        // Add AI response to history (without the tag for clarity)
        chatHistory.push({ role: 'assistant', content: rawContent });
        saveChatHistory();

        // Typewriter render
        await typewriterRender(cleanText);

        // Show result card if we got data
        if (resultData && !resultShown) {
          resultShown = true;
          await delay(600);
          showResultCard(resultData.price, resultData.percent);
        }

      } catch (err) {
        removeTypingIndicator(typingEl);
        const errMsg = currentLang === 'ru'
          ? `⚠ Ошибка соединения с AI. Попробуй ещё раз.`
          : `⚠ Connection error. Please try again.`;
        appendMessage('ai', errMsg, false);
        console.error(err);
      } finally {
        isTyping = false;
        setSendDisabled(false);
        userInput.focus();
      }
    }

    /* =============================================
       TEXT PARSING
    ============================================= */

    /**
     * Extract [RESULT_DATA: price|percent] from text.
     * Returns { cleanText, resultData }
     */
    function extractResultData(text) {
      const regex = /\[RESULT_DATA:\s*(\d+)\|(\d+)\]/i;
      const match = text.match(regex);
      let resultData = null;

      if (match) {
        resultData = {
          price:   parseInt(match[1], 10),
          percent: parseInt(match[2], 10)
        };
      }

      // Remove the tag from text (including any surrounding whitespace)
      const cleanText = text.replace(/\s*\[RESULT_DATA:[^\]]*\]\s*/gi, '').trim();

      return { cleanText, resultData };
    }

    /**
     * Parse markdown-like syntax to HTML for display.
     * **text** → <span class="ai-highlight">text</span>
     * *text*   → remove asterisks
     * Lone *   → remove
     */
    function parseMarkdown(text) {
      // First: handle **bold** (double asterisks) — MUST come before single
      text = text.replace(/\*\*([^*]+?)\*\*/g, '<span class="ai-highlight">$1</span>');
      // Then: handle *italic* (single asterisks) — just strip them
      text = text.replace(/\*([^*\n]+?)\*/g, '$1');
      // Remove any remaining lone asterisks
      text = text.replace(/\*/g, '');
      return text;
    }

    /* =============================================
       TYPEWRITER EFFECT
    ============================================= */
    async function typewriterRender(rawText) {
      const t = UI_TEXT[currentLang];

      // Create message container
      const wrapper = document.createElement('div');
      wrapper.className = 'message ai';
      wrapper.innerHTML = `
        <div class="msg-meta">
          <span class="meta-dot"></span>
          <span>${t.ai}</span>
        </div>
        <div class="msg-bubble" id="typewriter-bubble"></div>
      `;
      chatMessages.appendChild(wrapper);
      scrollToBottom();

      const bubble = wrapper.querySelector('#typewriter-bubble');
      bubble.removeAttribute('id');

      // We will type character by character.
      // We keep a "raw buffer" and re-parse it each tick.
      // This handles partial ** gracefully.
      let rawBuffer = '';
      const chars = rawText.split('');
      const cursor = document.createElement('span');
      cursor.className = 'typing-cursor';

      bubble.appendChild(cursor);

      const SPEED = 18; // ms per character

      await new Promise((resolve) => {
        let i = 0;

        typingInterval = setInterval(() => {
          if (i < chars.length) {
            rawBuffer += chars[i];
            i++;

            // Re-render the parsed HTML
            const parsed = parseMarkdown(rawBuffer);
            bubble.innerHTML = parsed;
            bubble.appendChild(cursor);

            scrollToBottom();
          } else {
            clearInterval(typingInterval);
            // Remove cursor
            if (cursor.parentNode) cursor.parentNode.removeChild(cursor);
            // Final render to ensure complete
            bubble.innerHTML = parseMarkdown(rawBuffer);
            scrollToBottom();
            resolve();
          }
        }, SPEED);
      });
    }

    /* =============================================
       RENDER SAVED HISTORY
    ============================================= */
    function renderSavedHistory() {
      // Re-render all messages from history without typewriter
      // Filter out system messages
      const msgs = chatHistory.filter(m => m.role !== 'system');
      msgs.forEach(msg => {
        if (msg.role === 'user') {
          appendMessage('user', msg.content, false);
        } else if (msg.role === 'assistant') {
          const { cleanText } = extractResultData(msg.content);
          appendMessage('ai', cleanText, false);

          // Check for result data in last AI message
          const { resultData } = extractResultData(msg.content);
          if (resultData && !resultShown) {
            resultShown = true;
            // Show after a brief moment
            setTimeout(() => showResultCard(resultData.price, resultData.percent), 400);
          }
        }
      });
      scrollToBottom();
    }

    /* =============================================
       APPEND MESSAGE (instant, no typewriter)
    ============================================= */
    function appendMessage(role, content, animate = true) {
      const t = UI_TEXT[currentLang];
      showEmptyState(false);

      const wrapper = document.createElement('div');
      wrapper.className = `message ${role}`;
      if (!animate) wrapper.style.animation = 'none';

      const label = role === 'user' ? t.you : t.ai;
      const parsed = role === 'ai' ? parseMarkdown(content) : escapeHtml(content);

      wrapper.innerHTML = `
        <div class="msg-meta">
          <span class="meta-dot"></span>
          <span>${label}</span>
        </div>
        <div class="msg-bubble">${parsed}</div>
      `;

      chatMessages.appendChild(wrapper);
      scrollToBottom();
    }

    /* =============================================
       TYPING INDICATOR
    ============================================= */
    function showTypingIndicator() {
      const wrap = document.createElement('div');
      wrap.className = 'message ai';
      wrap.id = 'typing-wrap';

      const ind = document.createElement('div');
      ind.className = 'typing-indicator';
      ind.innerHTML = `
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      `;

      wrap.appendChild(ind);
      chatMessages.appendChild(wrap);
      scrollToBottom();
      return wrap;
    }

    function removeTypingIndicator(el) {
      if (el && el.parentNode) {
        el.parentNode.removeChild(el);
      }
    }

    /* =============================================
       RESULT CARD
    ============================================= */
    function showResultCard(price, percent) {
      const t = UI_TEXT[currentLang];
      const chatContainer = document.getElementById('chat-container');

      // Clamp percent for progress bar
      const barPercent = Math.min(Math.max(percent, 0), 100);
      // Price bar — normalize to some scale (e.g. max 20000)
      const maxPrice = 20000;
      const priceBarPct = Math.min(Math.round((price / maxPrice) * 100), 100);

      const overlay = document.createElement('div');
      overlay.className = 'result-card-overlay';
      overlay.id = 'result-overlay';

      overlay.innerHTML = `
        <div class="result-card">
          <div class="result-card-badge">
            <span class="badge-dot"></span>
            ${t.resultBadge}
          </div>
          <h2>${t.resultTitle}</h2>

          <div class="result-metric">
            <div class="result-metric-header">
              <span class="result-metric-label">${t.metaValue}</span>
              <span class="result-metric-value" id="price-counter">$0</span>
            </div>
            <div class="result-progress-track">
              <div class="result-progress-bar" id="price-bar" style="width:0%"></div>
            </div>
          </div>

          <div class="result-metric">
            <div class="result-metric-header">
              <span class="result-metric-label">${t.metaUnique}</span>
              <span class="result-metric-value" id="pct-counter">0%</span>
            </div>
            <div class="result-progress-track">
              <div class="result-progress-bar" id="pct-bar" style="width:0%"></div>
            </div>
          </div>

          <div class="result-divider"></div>

          <div class="result-sub-text">
            ${t.resultSub} <span>${percent}%</span> ${t.resultSubEnd}
          </div>

          <div class="result-actions">
            <button class="btn-share" id="btn-share">${t.btnShare}</button>
            <button class="btn-close-result" id="btn-close-result">${t.btnClose}</button>
          </div>
        </div>
      `;

      chatContainer.appendChild(overlay);

      // Animate bars and counters after a frame
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          // Price bar
          const priceBar = document.getElementById('price-bar');
          if (priceBar) priceBar.style.width = priceBarPct + '%';

          // Percent bar
          const pctBar = document.getElementById('pct-bar');
          if (pctBar) pctBar.style.width = barPercent + '%';

          // Price counter animation
          animateCounter('price-counter', 0, price, 1400, (v) => '$' + v.toLocaleString());

          // Percent counter animation
          animateCounter('pct-counter', 0, percent, 1200, (v) => v + '%');
        });
      });

      // Close button
      document.getElementById('btn-close-result').addEventListener('click', () => {
        overlay.style.animation = 'overlayIn 0.3s ease reverse both';
        setTimeout(() => overlay.remove(), 300);
      });

      // Share button
      document.getElementById('btn-share').addEventListener('click', () => {
        const shareText = currentLang === 'ru'
          ? `Мой AI-анализ: рыночная стоимость $${price.toLocaleString()}, уникальность ${percent}%. Оцени себя → https://t.me/VioraStudio`
          : `My AI analysis: market value $${price.toLocaleString()}, uniqueness ${percent}%. Evaluate yourself → https://t.me/VioraStudio`;
        navigator.clipboard.writeText(shareText).then(() => {
          showToast(t.toastCopied);
        }).catch(() => {
          showToast('📋 ' + shareText);
        });
      });
    }

    /* =============================================
       COUNTER ANIMATION
    ============================================= */
    function animateCounter(elId, from, to, duration, formatter) {
      const el = document.getElementById(elId);
      if (!el) return;

      const startTime = performance.now();

      function update(now) {
        const elapsed = now - startTime;
        const progress = Math.min(elapsed / duration, 1);
        // Ease out cubic
        const eased = 1 - Math.pow(1 - progress, 3);
        const current = Math.round(from + (to - from) * eased);
        el.textContent = formatter(current);

        if (progress < 1) {
          requestAnimationFrame(update);
        } else {
          el.textContent = formatter(to);
        }
      }

      requestAnimationFrame(update);
    }

    /* =============================================
       RESET CHAT
    ============================================= */
    function resetChat() {
      chatHistory = [];
      resultShown = false;
      saveChatHistory();

      // Clear messages
      chatMessages.innerHTML = '';

      // Re-add empty state
      const es = document.createElement('div');
      es.className = 'empty-state';
      es.id = 'empty-state';
      es.innerHTML = `
        <div class="empty-state-icon">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z" fill="#66FCF1" opacity="0.7"/>
          </svg>
        </div>
        <h3 id="empty-title">${UI_TEXT[currentLang].emptyTitle}</h3>
        <p id="empty-desc">${UI_TEXT[currentLang].emptyDesc}</p>
        <div class="empty-state-tag" id="empty-tag">${UI_TEXT[currentLang].emptyTag}</div>
      `;
      chatMessages.appendChild(es);

      showToast(UI_TEXT[currentLang].toastReset);

      // Remove any result overlay
      const overlay = document.getElementById('result-overlay');
      if (overlay) overlay.remove();

      // Stop any typing
      if (typingInterval) {
        clearInterval(typingInterval);
        typingInterval = null;
      }
      isTyping = false;
      setSendDisabled(false);

      // Trigger AI first message again
      triggerAIFirstMessage();
    }

    /* =============================================
       UTILITY FUNCTIONS
    ============================================= */
    function showEmptyState(show) {
      const es = document.getElementById('empty-state');
      if (es) es.style.display = show ? 'flex' : 'none';
    }

    function scrollToBottom() {
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function setSendDisabled(disabled) {
      sendBtn.disabled = disabled;
      userInput.disabled = disabled;
    }

    function saveChatHistory() {
      localStorage.setItem('ai_chat_history', JSON.stringify(chatHistory));
    }

    function delay(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function escapeHtml(text) {
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;')
        .replace(/\n/g, '<br>');
    }

    /* =============================================
       TOAST NOTIFICATION
    ============================================= */
    let toastTimeout = null;

    function showToast(msg) {
      toastEl.textContent = msg;
      toastEl.classList.add('show');
      if (toastTimeout) clearTimeout(toastTimeout);
      toastTimeout = setTimeout(() => {
        toastEl.classList.remove('show');
      }, 2400);
    }

    /* =============================================
       BOOT
    ============================================= */
    init();
  </script>
</body>
</html>
